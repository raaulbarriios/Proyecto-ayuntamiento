<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Casetero - Gestión de Caseta</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background-color: #f4f7f6; }
        .caseteroHeader {
            background: #27ae60; /* Verde para distinguir del admin */
            color: white;
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .caseteroHeader .toolTitle {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .logoutAction {
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.9;
        }
        .logoutAction:hover { opacity: 1; text-decoration: underline; }

        .mainPanel {
            padding: 40px 4%;
            max-width: 700px;
            margin: 0 auto;
        }
        .infoCard {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            padding: 35px;
        }
        .infoCard h2 {
            margin-bottom: 30px;
            font-weight: 800;
            color: #2c3e50;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 15px;
        }
        .formField {
            margin-bottom: 25px;
        }
        .formField label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .formField input {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #333;
        }
        .formField input:read-only {
            background-color: #fafafa;
            color: #aaa;
            border-color: #f4f4f4;
            cursor: not-allowed;
        }
        .updateBtn {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        .updateBtn:hover { background: #219150; }

        .notifyBox {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }
        .notifySuccess { background: #e9f7ef; color: #1e8449; }
    </style>
</head>
<body>

    <header class="caseteroHeader">
        <div class="toolTitle">
            <i class="fas fa-store"></i> Panel del Casetero
        </div>
        <div id="logoutTrigger" class="logoutAction">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </div>
    </header>

    <main class="mainPanel">
        <div class="infoCard">
            <h2>Gestión de mi Caseta</h2>
            <form id="caseteroForm">
                <div class="formField">
                    <label>Nº de Caseta</label>
                    <input type="text" id="casetaId" readonly>
                </div>
                <div class="formField">
                    <label>Correo de Acceso</label>
                    <input type="text" id="casetaEmail" readonly>
                </div>
                <div class="formField">
                    <label for="casetaName">Nombre de la Caseta</label>
                    <input type="text" id="casetaName" placeholder="Actualiza el nombre">
                </div>
                <div class="formField">
                    <label for="casetaPass">Cambiar Contraseña</label>
                    <input type="text" id="casetaPass" placeholder="Nueva contraseña">
                </div>

                <button type="submit" class="updateBtn">
                    <i class="fas fa-sync-alt"></i> ACTUALIZAR MIS DATOS
                </button>

                <div id="msgBox" class="notifyBox"></div>
            </form>
        </div>
    </main>

    <script type="module" src="casetero.js"></script>
</body>
</html>
