<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Caseteros - Ayuntamiento de Algeciras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { 
            background-color: #f0f4f8; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Cabecera privada independiente de la navegación pública */
        .privateHeader {
            background: var(--blueGradient);
            padding: 15px 4%;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .privateHeader img {
            height: 70px;
            width: auto;
        }
        .mainArea {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .loginContainer {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .loginTitle {
            color: var(--darkBlue);
            margin-bottom: 25px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .formGroup {
            margin-bottom: 20px;
            text-align: left;
        }
        .formGroup label {
            display: block;
            margin-bottom: 8px;
            color: var(--textColor);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .formGroup input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .formGroup input:focus {
            border-color: var(--accentBlue);
            box-shadow: 0 0 0 3px rgba(11, 99, 165, 0.1);
        }
        .loginBtn {
            width: 100%;
            padding: 14px;
            background: var(--accentBlue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }
        .loginBtn:hover {
            background: var(--darkBlue);
        }
        .loginBtn:active {
            transform: scale(0.98);
        }
        .errorMsg {
            color: #d93025;
            background: #fce8e6;
            border: 1px solid #fad2cf;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
        @media (max-width: 480px) {
            .loginContainer {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="privateHeader" role="banner">
        <img src="../fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
    </header>

    <div class="mainArea">
        <div class="loginContainer">
            <h1 class="loginTitle">Acceso Privado Caseteros</h1>
            <form id="loginForm">
                <div class="formGroup">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" required placeholder="tu@correo.com">
                </div>
                <div class="formGroup">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="loginBtn" id="submitBtn">Iniciar Sesión</button>
                <div id="errorMsg" class="errorMsg">Credenciales incorrectas. Inténtalo de nuevo.</div>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
