<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Privado - Casetero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { 
            background-color: #f0f4f8; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Cabecera privada independiente de la navegación pública */
        .privateHeader {
            background: var(--blueGradient);
            padding: 15px 4%;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .privateHeader img {
            height: 70px;
            width: auto;
        }
        .mainArea {
            flex: 1;
            padding: 40px 20px;
        }
        .panelContainer {
            max-width: 600px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .panelHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--lightGray);
            padding-bottom: 20px;
        }
        .panelTitle {
            color: var(--darkBlue);
            font-size: 1.6rem;
            font-weight: 800;
        }
        .logoutBtn {
            background: #d93025;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logoutBtn:hover {
            background: #b3261e;
        }
        .logoutBtn:active {
            transform: scale(0.95);
        }
        .dataCard {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 25px;
        }
        .dataCard h3 {
            margin-bottom: 20px;
            color: var(--accentBlue);
            font-size: 1.2rem;
            font-weight: 700;
        }
        .formGroup {
            margin-bottom: 20px;
        }
        .formGroup label {
            display: block;
            margin-bottom: 8px;
            color: var(--textColor);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .formGroup input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .formGroup input:focus {
            border-color: var(--accentBlue);
            box-shadow: 0 0 0 3px rgba(11, 99, 165, 0.1);
        }
        .formGroup input:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
            color: #6c757d;
            border-color: #dee2e6;
        }
        .saveBtn {
            width: 100%;
            padding: 14px;
            background: var(--accentBlue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }
        .saveBtn:hover {
            background: var(--darkBlue);
        }
        .saveBtn:active {
            transform: scale(0.98);
        }
        .saveBtn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .statusMsg {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .statusMsg.success {
            color: #0f5132;
            background-color: #d1e7dd;
            border: 1px solid #badbcc;
            display: block;
        }
        .statusMsg.error {
            color: #842029;
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            display: block;
        }
        /* Skeleton Loader Simple */
        .skeleton {
            background: #e2e8f0;
            color: transparent !important;
            border-color: #e2e8f0 !important;
            animation: pulse 1.5s infinite ease-in-out;
            user-select: none;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        @media (max-width: 600px) {
            .panelHeader {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .panelContainer {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="privateHeader" role="banner">
        <img src="../fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
    </header>

    <div class="mainArea">
        <div class="panelContainer">
            <div class="panelHeader">
                <h1 class="panelTitle">Mi Caseta</h1>
                <button id="logoutBtn" class="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>

            <div class="dataCard">
                <h3>Información de la Caseta</h3>
                <form id="editForm">
                    <div class="formGroup">
                        <label>Número de Caseta (Solo Lectura)</label>
                        <input type="text" id="numeroCaseta" class="skeleton" disabled value="Cargando...">
                    </div>
                    <div class="formGroup">
                        <label for="nombreCaseta">Nombre de la Caseta</label>
                        <input type="text" id="nombreCaseta" class="skeleton" required value="Cargando...">
                    </div>
                    <div class="formGroup">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" class="skeleton" required value="Cargando...">
                    </div>
                    <div class="formGroup">
                        <label for="password">Contraseña</label>
                        <input type="text" id="password" class="skeleton" required value="Cargando...">
                    </div>
                    <button type="submit" class="saveBtn" id="saveBtn"><i class="fas fa-save"></i> Guardar Cambios</button>
                    <div id="statusMsg" class="statusMsg"></div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="panel.js"></script>
</body>
</html>
