<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración Privado</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Estilo unificado y centralizado del Admin -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <div id="loginSection">
        <header class="adminHeader">
            <div class="adminHeaderLogo">
                <img src="fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
            </div>
            <div class="adminHeaderActions">
                <span class="privateAccessBadge">Acceso Privado</span>
            </div>
        </header>

        <main class="authBody">
            <div class="authCard">
                <img src="fotos/Logo Algeciras 1 tinta fondos claros ver azul sin letras interiores.png" alt="Logo del Ayuntamiento de Algeciras" class="authLogo">
                <h1>Admin Login</h1>
                <p>Sistema de gestión exclusivo</p>
                <form id="adminLoginForm">
                    <div class="formGroup">
                    <label>Usuario</label>
                    <input type="text" id="userInput" placeholder="Introduce 'admin'" required>
                </div>
                <div class="formGroup">
                    <label>Contraseña</label>
                    <input type="password" id="passInput" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btnSubmit">ACCEDER AL PANEL</button>
                <p id="errorBox" class="errorMsg">Credenciales incorrectas (Usa admin/admin)</p>
            </form>
        </div>
        </main>

        <footer class="adminFooter" role="contentinfo">
            <div class="footerContent">
                <div class="footerLeft">
                    <img src="fotos/Logo Algeciras 1 tinta fondos oscuros.png" alt="Ayuntamiento de Algeciras" class="footerIcon">
                    <span class="footerHandle">ayuntamientoalgeciras</span>
                </div>
                <div class="copyrightText">© Ayuntamiento de Algeciras</div>
            </div>
        </footer>
    </div>

    <div id="panelSection" class="hidden">
        <header class="adminHeader">
            <div class="adminHeaderLogo">
                <img src="fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
            </div>
            <div class="adminHeaderTitle">
                <h1>Control de Administración</h1>
            </div>
            <div class="adminHeaderActions">
                <button id="logoutBtn" class="logoutBtn" title="Cerrar Sesión" aria-label="Cerrar Sesión"><i class="fas fa-power-off"></i> <span class="logoutText">SALIR</span></button>
            </div>
        </header>

        <main class="panelMain">
            <div class="adminCard">
                <h2>Gestión de la Base de Datos</h2>
                <form id="managementForm">
                    <div class="formGrid">
                        <div class="formGroup">
                            <label>Nº de Caseta</label>
                            <input type="text" id="numCaseta" placeholder="Ej: 54" required>
                        </div>
                        <div class="formGroup">
                            <label>Nombre de la Caseta</label>
                            <input type="text" id="nombreCaseta" placeholder="Nombre completo">
                        </div>
                        <div class="formGroup">
                            <label>Correo del Propietario</label>
                            <input type="email" id="correo" placeholder="ejemplo@correo.com">
                        </div>
                        <div class="formGroup">
                            <label>Contraseña</label>
                            <input type="text" id="password" placeholder="Contraseña de acceso">
                        </div>
                    </div>

                    <div class="btnRow">
                        <button type="button" id="saveAction" class="btn btnSave"><i class="fas fa-save"></i> GUARDAR / ACTUALIZAR</button>
                        <button type="button" id="deleteAction" class="btn btnDelete"><i class="fas fa-trash-alt"></i> ELIMINAR CASETA</button>
                    </div>

                    <div id="statusBox" class="statusNotif"></div>
                </form>
            </div>
        </main>

        <footer class="adminFooter" role="contentinfo">
            <div class="footerContent">
                <div class="footerLeft">
                    <img src="fotos/Logo Algeciras 1 tinta fondos oscuros.png" alt="Ayuntamiento de Algeciras" class="footerIcon">
                    <span class="footerHandle">ayuntamientoalgeciras</span>
                </div>
                <div class="copyrightText">© Ayuntamiento de Algeciras</div>
            </div>
        </footer>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
