<!DOCTYPE html> <!-- Declara que este documento sigue el estándar HTML5 -->
<html lang="es"> <!-- Raíz del documento; lang="es" indica que el idioma es español -->
<head> <!-- Sección de metadatos: no se muestra en pantalla pero configura la página -->

    <meta charset="UTF-8"> <!-- Establece la codificación de caracteres (permite tildes y ñ) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adapta el zoom al ancho del dispositivo (imprescindible para móvil) -->
    <title>Panel de Administración - Gestión</title> <!-- Texto que aparece en la pestaña del navegador -->
    <link rel="stylesheet" href="style.css"> <!-- Carga el archivo de estilos CSS compartido con toda la aplicación -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"> <!-- Carga la tipografía "Inter" desde Google Fonts (pesos: 300, 400, 600, 700) -->

</head>
<body class="admin-body"> <!-- Inicio del contenido visible; la clase diferencia este layout del de la vista pública -->

    <header class="navbar"> <!-- Barra de navegación superior del panel de administración -->
        <div class="logo">📍 Eventos - Panel</div> <!-- Logotipo y nombre de la sección -->
        <nav> <!-- Elemento semántico de navegación; agrupa los enlaces de menú -->
            <a href="index.html">Volver al Mapa</a> <!-- Enlace para regresar a la vista pública del mapa -->
        </nav>
    </header>

    <main class="admin-container"> <!-- Contenido principal; admin-container aplica el layout centrado del panel -->

        <!-- Panel de Edición: sección con el formulario para modificar los datos de una caseta -->
        <section class="dashboard-section" id="dashboard-section"> <!-- Sección semántica del panel; id="dashboard-section" permite referenciarlo desde JS si fuera necesario -->
            <div class="glass-card dashboard-card"> <!-- Tarjeta con efecto cristal (glassmorphism) que envuelve todo el formulario -->
                <h2>Editar mi Punto</h2> <!-- Título principal del formulario de edición -->

                <!-- Bloque de identificación: el propietario introduce su ID para cargar su caseta -->
                <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px;"> <!-- Grupo de campo con fondo semitransparente para distinguirlo visualmente -->
                    <label>ID de Propietario (ownerId)</label> <!-- Etiqueta descriptiva del campo de identificación -->
                    <div style="display: flex; gap: 10px;"> <!-- Fila flexible que coloca el input y el botón en horizontal con separación de 10px -->
                        <input type="text" id="owner-id-input" placeholder="Ej: caseta1" required style="margin-bottom: 0;"> <!-- Campo donde el propietario escribe su identificador único; admin.js lo lee al pulsar "Cargar" -->
                        <button type="button" id="load-btn" class="btn-secondary" style="white-space: nowrap;">Cargar Caseta</button> <!-- Botón que dispara la búsqueda en Firebase; admin.js escucha su clic -->
                    </div>
                </div>

                <!-- Formulario de edición: oculto por defecto hasta que se carga una caseta válida -->
                <form id="edit-form" class="hidden"> <!-- La clase "hidden" lo oculta; admin.js la elimina tras una carga exitosa -->

                    <div class="form-group"> <!-- Grupo de campo: agrupa etiqueta + input con estilos coherentes -->
                        <label>Nombre del Punto de Interés</label> <!-- Etiqueta del campo de nombre -->
                        <input type="text" id="edit-nombre" required> <!-- Campo editable del nombre; admin.js lo rellena con el valor de Firebase y lo lee al guardar -->
                    </div>

                    <div class="form-group"> <!-- Grupo de campo para la descripción -->
                        <label>Descripción</label> <!-- Etiqueta del área de texto -->
                        <textarea id="edit-descripcion" rows="4">Descripción genérica para el primer punto de interés del evento. Aquí puedes añadir detalles relevantes.</textarea> <!-- Área de texto multilínea (4 filas); admin.js la rellena con el valor de Firebase y la lee al guardar -->
                    </div>

                    <div class="form-group"> <!-- Grupo de campo para el horario general -->
                        <label>Horario</label> <!-- Etiqueta del campo de horario -->
                        <input type="text" id="edit-horario" value="12:00 - 04:00"> <!-- Campo de texto para el horario; valor por defecto "12:00 - 04:00"; admin.js lo gestiona -->
                    </div>

                    <div class="programacion-editor"> <!-- Bloque específico para gestionar las actividades de la programación diaria -->
                        <h3>Programación de Hoy</h3> <!-- Subtítulo de la sección de actividades -->
                        <div id="prog-container"> <!-- Contenedor vacío donde admin.js inyecta dinámicamente las filas de actividades -->
                            <!-- Los items se inyectan por JS --> <!-- Nota: este espacio lo rellena admin.js en tiempo de ejecución -->
                        </div>
                        <button type="button" id="add-act-btn" class="btn-secondary">+ Añadir Nueva Actividad</button> <!-- Botón para insertar una nueva fila vacía de actividad; admin.js escucha su clic -->
                    </div>

                    <button type="button" id="save-btn" class="btn-success">Guardar Cambios y Actualizar Mapa</button> <!-- Botón principal de guardado; admin.js recoge todos los datos del formulario y los envía a Firebase -->

                </form>
            </div>
        </section>
    </main>

    <script type="module" src="admin.js"></script> <!-- Carga admin.js como módulo ES6 (permite usar import/export); se coloca al final para que el HTML esté listo antes de ejecutarse -->

</body> <!-- Fin del contenido visible -->
</html> <!-- Cierre del documento HTML -->
