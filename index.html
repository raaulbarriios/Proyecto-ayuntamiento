    <!-- 2. Identidad del Evento -->
    <section class="eventTitleSection">
        <h1 class="eventTitle">Feria Real de Algeciras 2026</h1>
    </section>

    <!-- 4. Mapa Interactivo -->
    <main class="mapWrapper">
        <div class="mapImageContainer">
            <img src="fotos/mapa_evento.jpg" alt="Mapa de la Feria Real de Algeciras 2026" id="eventMapImg" class="mapImage">
            <!-- SVG overlay para interactividad (casetas clicables) -->
            <svg id="eventMap" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" class="mapSvgOverlay">
                <rect x="50" y="50" width="100" height="80" class="mapItem" data-id="c1" data-name="Caseta Los Amigos" data-street="Calle Real, 1" data-owner="Asociación Recreativa"/>
                <rect x="160" y="50" width="100" height="80" class="mapItem" data-id="c2" data-name="Peña El Estribo" data-street="Calle Real, 2" data-owner="Peña Flamenca"/>
                <rect x="270" y="50" width="100" height="80" class="mapItem" data-id="c3" data-name="Caseta Municipal" data-street="Plaza Mayor" data-owner="Ayuntamiento"/>
            </svg>
        </div>
    </main>

    <!-- 5. Panel de Información (Desplegable) -->
    <aside id="infoOverlay" class="detailsOverlay" aria-hidden="true">
        <button id="closePanelBtn" class="closeOverlayBtn" aria-label="Cerrar detalles">&times;</button>
        <div class="detailsContent">
            <h2 id="displayName">Nombre de la Caseta</h2>
            <p id="displayLocation">Ubicación: Calle Principal</p>
            <div id="firebaseData"></div>
        </div>
    </aside>

    <!-- 6. Pie de Página (Diseño institucional según imagen) -->
    <footer class="mainFooter">

        <div class="footerContent">

            </div>
            <div class="footerRight">
                <span class="copyrightText">&copy; Ayuntamiento de Algeciras</span>
            </div>
        </div>
    </footer>
