<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Evento - Ayuntamiento de Algeciras</title>
    <!-- Google Fonts: Inter (Medium 500) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 5.15.4 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Cabecera Institucional (Normativa Algeciras) -->
    <header class="mainHeader" role="banner">
        <div class="headerContent">
            <!-- Fila Superior: Logo y Acciones -->
            <div class="headerTopRow">
                <div class="logoContainer">
                    <img src="fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras" class="mainLogoImg">
                </div>
                
                <!-- Acciones Móvil -->
                <div class="mobileActions">
                    <a href="https://www.google.com/maps/search/?api=1&query=Recinto+Ferial+de+Algeciras" 
                       id="mapLinkMobile"
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="map-link-mobile" 
                       aria-label="Ver ubicación en el mapa">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Mapa</span>
                    </a>
                    <button id="toggleMobileSearch" class="mobileBtn" aria-label="Abrir buscador" aria-expanded="false">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <!-- Acciones Desktop -->
                <div class="desktopHeaderActions">
                    <div class="headerActionsWrapper">
                        <div class="searchContainer">
                            <input type="text" id="manualSearch" class="searchInput" placeholder="Texto a buscar">
                            <button id="searchTrigger" class="searchBtn"><i class="fas fa-search"></i> <span class="searchBtnText">Buscar</span></button>
                        </div>
                        <div class="map-link-container">
                            <a href="https://www.google.com/maps/search/?api=1&query=Recinto+Ferial+de+Algeciras" 
                               id="mapLinkDesktop"
                               target="_blank" 
                               rel="noopener noreferrer" 
                               class="map-link" 
                               aria-label="Ver ubicación en el mapa">
                                <i class="fas fa-map-marker-alt"></i>
                                <span class="map-text-desktop">Ver en el mapa</span>
                                <span class="map-text-mobile">Mapa</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Fila Inferior (Buscador Móvil Desplegable) -->
            <div id="mobileSearchRow" class="searchRowMobile" aria-hidden="true">
                <div class="searchInlineBox">
                    <input type="text" id="mobileSearchInput" placeholder="Texto a buscar">
                    <button id="mobileSearchAction" class="mobileSearchActionBtn">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 2. Identidad del Evento -->
    <section class="eventTitleSection">
        <h1 class="eventTitle">Feria Real de Algeciras 2026</h1>
    </section>

    <!-- 3. Mapa Interactivo -->
    <main class="mapWrapper">
        <div class="mapImageContainer">
            <img src="fotos/mapa_evento.jpg" alt="Mapa interactivo del evento" class="mapImage">
            <svg id="eventMap" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" class="mapSvgOverlay">
                <!-- Los recuadros interactivos han sido eliminados según la solicitud -->
            </svg>
        </div>
    </main>

    <!-- 4. Panel de Detalles (Lateral) -->
    <div id="infoOverlay" class="detailsOverlay" aria-hidden="true">
        <button id="closePanelBtn" class="closeOverlayBtn" aria-label="Cerrar panel">&times;</button>
        <h2 id="displayName">Nombre del Elemento</h2>
        <p id="displayLocation">Ubicación: Calle Principal</p>
        <hr>
        <div class="itemInfo">
            <p><i class="fas fa-info-circle"></i> Información detallada sobre el elemento seleccionado.</p>
        </div>
    </div>

    <!-- 5. Pie de Página -->
    <footer class="mainFooter">
        <div class="footerContent">
            <div class="footerLeft">
                <img src="fotos/Logo Algeciras 1 tinta fondos oscuros sin letras interiores.png" alt="Escudo" class="footerIcon">
                <span class="footerHandle">ayuntamientoalgeciras</span>
            </div>
            <div class="footerRight">
                <span class="copyrightText">&copy; Ayuntamiento de Algeciras</span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
