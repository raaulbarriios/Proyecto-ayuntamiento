<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración Privado</title>
    
    <!-- METADATA Y ESTILOS VISUALES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Archivo donde guardamos todos los colores y tamaños -->
    
    <!-- MAPA DE IMPORTACIONES (FIREBASE) -->
    <!-- Resolución de bare specifiers para módulos de Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js"
        }
      }
    </script>
</head>
<body class="admin-body">

    <!-- ========================================================= -->
    <!-- SECCIÓN DE AUTENTICACIÓN (LOGIN)                          -->
    <!-- ========================================================= -->
    <div id="loginSection">
        <header class="adminHeader">
            <div class="adminHeaderLogo">
                <img src="fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
            </div>
            <div class="adminHeaderActions">
                <span class="privateAccessBadge">Acceso Privado</span>
            </div>
        </header>

        <main class="authBody">
            <div class="authCard">
                <img src="fotos/Logo Algeciras 1 tinta fondos claros ver azul sin letras interiores.png" alt="Logo del Ayuntamiento de Algeciras" class="authLogo">
                <h1>Admin Login</h1>
                <p>Sistema de gestión exclusivo</p>
                
                <!-- Formulario de credenciales de administrador -->
                <form id="adminLoginForm">
                    <div class="formGroup">
                        <label>Correo Electrónico</label>
                        <input type="email" id="userInput" placeholder="administrador@gmail.com" required>
                    </div>
                    <div class="formGroup">
                        <label>Contraseña</label>
                        <input type="password" id="passInput" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btnSubmit">ACCEDER AL PANEL</button>
                    <p id="errorBox" class="errorMsg"></p> <!-- Contenedor de feedback de errores -->
                </form>
            </div>
        </main>

        <!-- Footer Institucional -->
        <footer class="adminFooter" role="contentinfo">
            <div class="footerContent">
                <div class="footerLeft">
                    <img src="fotos/Logo Algeciras 1 tinta fondos oscuros.png" alt="Ayuntamiento de Algeciras" class="footerIcon">
                    <span class="footerHandle">ayuntamientoalgeciras</span>
                </div>
                <div class="copyrightText">© Ayuntamiento de Algeciras</div>
            </div>
        </footer>
    </div>

    <!-- ========================================================= -->
    <!-- DASHBOARD DE ADMINISTRACIÓN                               -->
    <!-- ========================================================= -->
    <div id="panelSection" class="hidden">
        <header class="adminHeader">
            <div class="adminHeaderLogo">
                <img src="fotos/Logo algeciras color blanco texto derecha.png" alt="Ayuntamiento de Algeciras">
            </div>
            <div class="adminHeaderTitle">
                <h1>Control de Administración</h1>
            </div>
            <div class="adminHeaderActions">
                <!-- Acción: Revocación de sesión -->
                <button id="logoutBtn" class="logoutBtn" title="Cerrar Sesión" aria-label="Cerrar Sesión"><i class="fas fa-power-off"></i> <span class="logoutText">SALIR</span></button>
            </div>
        </header>

        <main class="panelMain">
            <div class="adminCard">
                <h2>Gestión de la Base de Datos</h2>
                
                <!-- Formulario de gestión de metadatos de casetas -->
                <form id="managementForm">
                    <div class="formGrid">
                        <!-- El input ID desencadena la consulta a Firestore -->
                        <div class="formGroup">
                            <label>Nº de Caseta</label>
                            <input type="text" id="numCaseta" placeholder="Ej: 54" required>
                        </div>
                        <div class="formGroup">
                            <label>Nombre de la Caseta</label>
                            <input type="text" id="nombreCaseta" placeholder="Nombre completo">
                        </div>
                        <div class="formGroup">
                            <label>Correo del Propietario</label>
                            <input type="email" id="correo" placeholder="ejemplo@correo.com">
                        </div>
                        <div class="formGroup">
                            <label>Contraseña</label>
                            <input type="text" id="password" placeholder="Contraseña de acceso">
                        </div>
                    </div>

                    <!-- Controles de persistencia -->
                    <div class="btnRow">
                        <button type="button" id="saveAction" class="btn btnSave"><i class="fas fa-sync-alt"></i> ACTUALIZAR</button>
                        <button type="button" id="deleteAction" class="btn btnDelete"><i class="fas fa-trash-alt"></i> ELIMINAR</button>
                    </div>
                    
                    <div class="btnRow" style="margin-top: 15px; gap: 15px;">
                        <button type="button" id="enableAction" class="btn" style="background-color: #2e7d32; color: white;"><i class="fas fa-check-circle"></i> HABILITAR</button>
                        <button type="button" id="disableAction" class="btn" style="background-color: #f57c00; color: white;"><i class="fas fa-times-circle"></i> DESHABILITAR</button>
                    </div>

                    <!-- Contenedor de notificaciones de estado de la transacción -->
                    <div id="statusBox" class="statusNotif"></div>
                </form>
            </div>
        </main>

        <footer class="adminFooter" role="contentinfo">
            <div class="footerContent">
                <div class="footerLeft">
                    <img src="fotos/Logo Algeciras 1 tinta fondos oscuros.png" alt="Ayuntamiento de Algeciras" class="footerIcon">
                    <span class="footerHandle">ayuntamientoalgeciras</span>
                </div>
                <div class="copyrightText">© Ayuntamiento de Algeciras</div>
            </div>
        </footer>
    </div>

    <!-- INICIALIZACIÓN DE MÓDULOS -->
    <!-- Carga del controlador principal de la UI y Firebase -->
    <script type="module" src="script.js"></script>
</body>
</html>
