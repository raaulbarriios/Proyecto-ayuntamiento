<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de la Feria - Ayuntamiento de Algeciras</title>
    <!-- Google Fonts: Inter (Medium 500) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Cabecera Institucional (Diseño según imagen oficial) -->
    <header class="mainHeader" role="banner">
        <div class="logoContainer">
            <!-- Escudo oficial -->
            <img src="logo.png" alt="Escudo de Algeciras" class="headerLogo" onerror="this.src='https://via.placeholder.com/60x70?text=ESCUDO'">
            <div class="headerText">
                <span class="textLine">Ayuntamiento</span>
                <span class="textLine">de Algeciras</span>
            </div>
        </div>
        
        <div class="headerRight">
            <!-- 3. Buscador Integrado -->
            <div class="searchContainer">
                <input type="text" id="manualSearch" class="searchInput" placeholder="Texto a buscar" aria-label="Buscar caseta">
                <button id="searchTrigger" class="searchBtn" aria-label="Botón de buscar">
                    <span class="searchIcon">🔍</span> Buscar
                </button>
            </div>
            <!-- Navegación de la Cabecera -->
            <nav class="headerNav">
                <a href="#">TEMAS</a>
                <span class="navDivider">|</span>
                <a href="#">AYUNTAMIENTO</a>
                <span class="navDivider">|</span>
                <a href="#">LA CIUDAD</a>
            </nav>
        </div>
    </header>

    <!-- 2. Identidad del Evento -->
    <section class="eventTitleSection">
        <h1 class="eventTitle">Feria Real de Algeciras 2026</h1>
    </section>

    <!-- 4. Mapa Interactivo -->
    <main id="mapArea" class="mapWrapper">
        <svg id="eventMap" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
            <!-- El contenido del mapa se puede cargar dinámicamente o incluir estáticamente -->
            <!-- Ejemplo de elementos de caseta representados como polígonos/rectángulos -->
            <rect id="booth_1" x="100" y="100" width="60" height="80" class="mapItem" data-name="La Güena" data-owner-id="admin_01" tabindex="0"></rect>
            <rect id="booth_2" x="180" y="100" width="60" height="80" class="mapItem" data-name="El Requiebro" data-owner-id="admin_02" tabindex="0"></rect>
            <rect id="booth_3" x="260" y="100" width="60" height="80" class="mapItem" data-name="Los Especiales" data-owner-id="admin_03" tabindex="0"></rect>
            
            <text x="100" y="90" font-size="12" fill="#666">Calle Algeciras</text>
        </svg>
    </main>

    <!-- 5. Panel de Información (Desplegable) -->
    <aside id="infoOverlay" class="detailsOverlay" aria-hidden="true">
        <button id="closePanelBtn" class="closeOverlayBtn" aria-label="Cerrar detalles">&times;</button>
        <div class="detailsContent">
            <h2 id="displayName">Nombre de la Caseta</h2>
            <p id="displayLocation">Ubicación: Calle Principal</p>
            <div id="firebaseData">
                <!-- Los datos de Firebase se inyectarán aquí -->
            </div>
        </div>
    </aside>

    <!-- 6. Pie de Página -->
    <footer class="mainFooter">
        <p>&copy; 2026 Ayuntamiento de Algeciras - Delegación de Feria y Fiestas</p>
        <p>Normativa Web Municipal - Accesibilidad WCAG 2.1</p>
    </footer>

    <!-- Configuración de la conexión con Firebase -->
    <script type="module" src="firebase-config.js"></script>
    <!-- Lógica de la aplicación -->
    <script type="module" src="script.js"></script>
</body>
</html>
